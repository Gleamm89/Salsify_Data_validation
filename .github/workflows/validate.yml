name: Validate Variants

on:
  push:
    paths:
      - "data/*.csv"
      - "*.py"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run validation script
        continue-on-error: true
        run: |
          mkdir -p output

          for file in data/validation_input_part_*.csv; do
            if [ -f "$file" ]; then
              echo "Validating $file"
              python validate_variants.py "$file" || true
            else
              echo "No validation input files found"
            fi
          done

      - name: Prepare Pages content
        if: always()
        run: |
          mkdir -p site

          if [ -f output/validation_group_details.html ]; then
            cp output/validation_group_details.html site/index.html
          else
            cat > site/index.html <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Validation Report</title>
            </head>
            <body>
              <h1>No validation report generated</h1>
              <p>The workflow ran, but no output/validation_group_details.html file was created.</p>
            </body>
          </html>
          EOF
          fi

      - name: Upload validation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: output/
          if-no-files-found: warn

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
