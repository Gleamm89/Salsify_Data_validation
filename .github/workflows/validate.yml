name: Validate Variants

on:
  push:
    paths:
      - "*.csv"
      - "*.py"
      - ".github/workflows/*.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run validation script
        run: python validate_variants.py export_converted.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-output
          path: output/

      - name: Prepare GitHub Pages content
        if: always()
        run: |
          mkdir -p docs
          cp output/validation_group_details.html docs/index.html

      - name: Commit GitHub Pages content
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/index.html
          git commit -m "Update validation dashboard" || echo "No changes to commit"
          git push
